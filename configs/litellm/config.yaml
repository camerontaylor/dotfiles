model_list:
  # Opus → Anthropic (OAuth forwarded from Claude Max subscription)
  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      # No api_key — client's x-api-key (OAuth token) forwarded via clean_headers

  # Sonnet → MiniMax M2.5
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: minimax/MiniMax-M2.5
      api_key: os.environ/MINIMAX_API_KEY
      api_base: https://api.minimax.io/anthropic/v1/messages

  # Haiku → MiniMax M2.5
  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: minimax/MiniMax-M2.5
      api_key: os.environ/MINIMAX_API_KEY
      api_base: https://api.minimax.io/anthropic/v1/messages

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # Proxy auth via custom header — keeps x-api-key free for OAuth passthrough
  litellm_key_header_name: "x-litellm-api-key"
  forward_client_headers_to_llm_api: true
  forward_llm_provider_auth_headers: true
